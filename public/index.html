<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>SMS Sender</title>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #0f172a;
    font-family: -apple-system, "Segoe UI", Roboto, sans-serif;
    padding: 20px;
  }
  .card {
    width: 100%;
    max-width: 420px;
    background: #1e293b;
    border-radius: 16px;
    padding: 28px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.4);
  }
  h1 {
    color: #f1f5f9;
    font-size: 20px;
    margin: 0 0 6px;
  }
  p.sub {
    color: #94a3b8;
    font-size: 13px;
    margin: 0 0 22px;
  }
  label {
    display: block;
    color: #cbd5e1;
    font-size: 13px;
    margin-bottom: 6px;
    margin-top: 16px;
  }
  input, textarea {
    width: 100%;
    padding: 12px 14px;
    border-radius: 10px;
    border: 1px solid #334155;
    background: #0f172a;
    color: #f1f5f9;
    font-size: 14px;
    outline: none;
  }
  input:focus, textarea:focus {
    border-color: #38bdf8;
  }
  textarea {
    resize: vertical;
    min-height: 90px;
  }
  button {
    width: 100%;
    margin-top: 22px;
    padding: 13px;
    border: none;
    border-radius: 10px;
    background: #38bdf8;
    color: #0f172a;
    font-weight: 600;
    font-size: 15px;
    cursor: pointer;
  }
  button:disabled {
    opacity: 0.6;
    cursor: not-allowed;
  }
  #result {
    margin-top: 16px;
    font-size: 13px;
    padding: 12px;
    border-radius: 10px;
    display: none;
    white-space: pre-wrap;
    word-break: break-word;
  }
  #result.ok {
    display: block;
    background: rgba(34,197,94,0.15);
    color: #4ade80;
  }
  #result.err {
    display: block;
    background: rgba(239,68,68,0.15);
    color: #f87171;
  }
</style>
</head>
<body>
  <div class="card">
    <h1>SMS পাঠান</h1>
    <p class="sub">নিজের / সম্মতিপ্রাপ্ত নম্বরে সরাসরি SMS পাঠাতে ফর্মটি পূরণ করুন</p>

    <label for="secret">API Secret</label>
    <input id="secret" type="password" placeholder="আপনার API_SECRET" />

    <label for="number">নম্বর</label>
    <input id="number" type="text" placeholder="01XXXXXXXXX" />

    <label for="text">মেসেজ</label>
    <textarea id="text" placeholder="আপনার মেসেজ লিখুন"></textarea>

    <button id="sendBtn">পাঠান</button>

    <div id="result"></div>
  </div>

<script>
  const btn = document.getElementById("sendBtn");
  const resultBox = document.getElementById("result");

  btn.addEventListener("click", async () => {
    const secret = document.getElementById("secret").value.trim();
    const number = document.getElementById("number").value.trim();
    const text = document.getElementById("text").value.trim();

    resultBox.className = "";
    resultBox.style.display = "none";

    if (!secret || !number || !text) {
      resultBox.textContent = "সব ঘর পূরণ করুন।";
      resultBox.className = "err";
      return;
    }

    btn.disabled = true;
    btn.textContent = "পাঠানো হচ্ছে...";

    try {
      const res = await fetch("/api/send-sms", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ number, text, secret }),
      });
      const data = await res.json();

      if (res.ok && data.success) {
        resultBox.textContent = "✅ SMS সফলভাবে পাঠানো হয়েছে: " + data.number;
        resultBox.className = "ok";
      } else {
        resultBox.textContent = "❌ ব্যর্থ: " + JSON.stringify(data.error || data);
        resultBox.className = "err";
      }
    } catch (e) {
      resultBox.textContent = "❌ নেটওয়ার্ক ত্রুটি: " + e.message;
      resultBox.className = "err";
    } finally {
      btn.disabled = false;
      btn.textContent = "পাঠান";
    }
  });
</script>
</body>
</html>
